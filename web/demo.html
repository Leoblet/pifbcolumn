<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <title>Демо · Дворецкий</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: system-ui, sans-serif;
      background: #0a1628; color: #e2e8f0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1.5rem; gap: 1.25rem;
    }
    h1 { font-size: 1.1rem; font-weight: 600; color: #94a3b8; margin: 0; text-align: center; }
    .status {
      font-size: 1.5rem; font-weight: 700; padding: 0.5rem 1.25rem; border-radius: 999px;
      background: #1e293b; border: 2px solid #334155;
    }
    .status.on { color: #4ade80; border-color: #22c55e; background: #052e16; }
    .status.off { color: #f87171; border-color: #ef4444; background: #450a0a; }
    .btns { display: flex; flex-direction: column; gap: 1rem; width: min(360px, 100%); }
    button {
      border: none; border-radius: 16px; padding: 1.35rem 1rem;
      font-size: 1.35rem; font-weight: 700; cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
    }
    button:active { transform: scale(0.97); }
    .on-btn { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; }
    .off-btn { background: linear-gradient(135deg, #475569, #64748b); color: #fff; }
    .hint { font-size: 0.8rem; color: #64748b; text-align: center; max-width: 320px; line-height: 1.45; }
    a { color: #38bdf8; }
  </style>
</head>
<body>
  <h1>Freedom Station · Дворецкий</h1>
  <div class="status off" id="status">Демо: …</div>
  <div class="btns">
    <button type="button" class="on-btn" id="btn-on">▶ Включить демо</button>
    <button type="button" class="off-btn" id="btn-off">■ Выключить демо</button>
  </div>
  <p class="hint">Работает сразу, без перезапуска. Добавьте страницу на главный экран телефона.<br>
    <a href="/">Полная панель</a></p>
  <script>
    const status = document.getElementById('status');
    async function refresh() {
      const d = await fetch('/api/demo').then(r => r.json()).catch(() => ({}));
      const on = !!d.enabled;
      status.textContent = on ? 'Демо: ВКЛ' : 'Демо: ВЫКЛ';
      status.className = 'status ' + (on ? 'on' : 'off');
    }
    async function setDemo(on) {
      await fetch('/api/demo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: on }),
      });
      await refresh();
    }
    document.getElementById('btn-on').onclick = () => setDemo(true);
    document.getElementById('btn-off').onclick = () => setDemo(false);
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
